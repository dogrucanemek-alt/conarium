name: ci

# Her push + PR'da deterministik kapı:
#  - build + lint (tsc --noEmit) + test (vitest) + test:checks (adversarial .mjs)
#  - Semgrep: kod deseni / injection / kripto / auth-misuse
#  - Gitleaks: koda gömülü sır / anahtar
# AI incelemesinin (agy/Claude) kör noktasını kapatır. Katmanlı savunma.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run test:checks

  semgrep:
    name: Semgrep (static security)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/security-audit --config p/secrets --config p/javascript --config p/typescript --error
        # Hard-gates on any finding. .semgrepignore drops generated/marketing/test
        # noise; the product code (src/, api/) scans clean (verified: 0 findings).

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
